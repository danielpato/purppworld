<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌐PURPPWORLD🌐</title>
    <link rel="icon" type="image/x-icon" href="/purppworld.png">
    <style>
        /* ---
        WEBSITE DESENHADO E DESENVOLVIDO POR
        DANIEL PATO / BYGRAIN 2026
        --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        #splash img {
            width: clamp(250px, 50vw, 500px);
            height: auto;
        }

        /* --- MAIN CONTENT --- */
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 20px;
        }

        .stretched-text {
            font-weight: 900;
            display: inline-block;
            transform: scaleY(2.5);
            line-height: 1;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .top-logo {
            width: clamp(150px, 30vw, 250px);
            height: auto;
            margin-bottom: 40px;
        }

        .header-text {
            font-size: clamp(18px, 4vw, 18px);
            margin-bottom: clamp(40px, 6vw, 60px); /* Increased margin since date is gone */
        }

        /* Out Now Style (Matching old countdown) */
        .out-now-text {
            font-size: clamp(32px, 8vw, 80px);
            margin-bottom: clamp(50px, 8vw, 80px);
        }

        /* Container for Shirt + Video */
        .content-row {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            margin-bottom: 50px;
        }

        .promo-image {
            width: clamp(200px, 35vw, 450px); 
            height: auto;
        }

        .video-container {
            width: clamp(300px, 45vw, 560px);
            aspect-ratio: 16 / 9;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-text {
            font-size: clamp(8px, 1.5vw, 12px); 
            margin-bottom: 60px;
        }

        /* Responsive: Stack on mobile */
        @media (max-width: 768px) {
            .content-row {
                flex-direction: column;
            }
            .video-container {
                width: 90vw;
            }
            .promo-image {
                width: 70vw;
            }
        }
    </style>
</head>
<body>
<a href="https://sippinpurppxyurinr5.lnk.to/DPTDB" 
   target="_blank" 
   style="
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
    color: #FF0000;
    text-decoration: none;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 16px;
    letter-spacing: 1px;
    transition: color 0.2s ease;
    background: none;
    border: none;
    padding: 0;
   "
   onmouseover="this.style.color='#ffffff';"
   onmouseout="this.style.color='#FF0000';"
>
  PRE-SAVE
</a>

    <div id="splash">
        <img src="/purppworld.png" alt="Logo Splash">
    </div>

    <div id="main-content">
        <img src="/purppworld.png" alt="Purpp World" class="top-logo">

        <div class="stretched-text header-text">OUT NOW</div>
        
        <div class="stretched-text out-now-text">DANÇA PA TE DAR BOLO</div>
        
        <div class="content-row">
            <img src="/dancatshirt.png" alt="DANÇA T-Shirt" class="promo-image">
            
            <div class="video-container">
                <iframe 
                    src="https://www.youtube.com/embed/4v_Jt6hxM1w" 
                    title="YouTube video player" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <div class="stretched-text footer-text">ANDA LÁ</div>
    </div>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('splash');
                const content = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                content.style.opacity = '1';
            }, 1300);
        });
    </script>

</body>
</html>
